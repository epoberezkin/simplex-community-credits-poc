<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Community Credits — Relay Operator</title>
    <style>
      body { font-family: system-ui, sans-serif; max-width: 640px; margin: 1rem auto; padding: 0 1rem; }
      .card { border: 1px solid #ccc; padding: 1rem; border-radius: 8px; margin: 1rem 0; }
      input, button { padding: 0.4rem; font-size: 0.9rem; }
      button { cursor: pointer; }
      button:disabled { opacity: 0.5; }
      .row { display: flex; justify-content: space-between; align-items: center; padding: 0.4rem 0; border-bottom: 1px dashed #ddd; }
      pre { background: #f5f5f5; padding: 0.5rem; font-size: 0.7rem; overflow-x: auto; }
      .err { color: #c33; }
      .ok { color: #393; }
      .mut { color: #666; font-size: 0.85rem; }
    </style>
  </head>
  <body>
    <h1 style="font-size:1.2rem">Dapp C — Relay Operator</h1>

    <section id="connect" class="card">
      <h2 style="font-size:1rem;margin:0">Wallet</h2>
      <div id="wallets"></div>
      <p id="walletStatus" class="mut">Not connected</p>
    </section>

    <section id="queue" class="card" hidden>
      <h2 style="font-size:1rem;margin:0">Queue</h2>
      <p class="mut">Paste an <code>?assign=…</code> or <code>?redeem=…</code> URL, scan a QR, or open a deep link.</p>
      <input id="pasteUrl" placeholder="Paste relay deep link…" />
      <button id="pasteBtn">Add to queue</button>
      <button id="scanBtn">📷 Scan QR</button>
      <video id="scanVideo" hidden style="width:100%;border-radius:8px;max-width:280px;"></video>
      <div id="queueList"></div>
    </section>

    <section id="credit" class="card" hidden>
      <h2 style="font-size:1rem;margin:0">Credit + withdraw</h2>
      <p>Credit balance: <strong id="creditBal">—</strong> tUSDC</p>
      <button id="withdrawBtn">Withdraw all</button>
      <p id="withdrawStatus" class="mut"></p>
    </section>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
